<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Treasure Chest Locator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="main">
        <div id="controls">
            <h3>Treasure Chest Positions</h3>
            <div id="inputs"> <!-- added in post --> </div>

            <button onclick="addInput()">Add Position</button>
            <button onclick="addMaxInputs()">Add Max Positions</button>
            <br>

            <input type="checkbox" name="labelsEnabled" id="labelsEnabled" onchange="draw()" checked>
            <label for="labelsEnabled">Enable Labels</label>
            <br>

            <label for="chestDotScale">Chest Dot Scale: </label>
            <input type="range" name="chestDotScale" id="chestDotScale" min="100" max="500" value="500" oninput="draw()">

            <noscript>
                <h2> This website relies on javascript. Please Enable Javascript to enable use of this page. </h2>
            </noscript>

        </div>
        <div id="canvasContainer">
            <canvas id="map" width="900" height="700"></canvas>
        </div>
    </div>
    <div id="footer">
        <p> Made by <a href="https://github.com/flyingbacen" target="_blank">Flyingbacen</a> based on 
            <a href="https://www.desmos.com/calculator/uixqtwi5lk" target="_blank">the Desmos tool here.</a>
        </p>
    </div>
    <script src="./script.ts" type="text/typescript"></script>
    <script src="https://unpkg.com/typescript/lib/typescript.js"></script>
    <script src="https://raw.githack.com/basarat/typescript-script/master/transpiler.js"></script>
</body>

</html>
